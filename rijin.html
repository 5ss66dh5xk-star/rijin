<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="日进">
  <meta name="application-name" content="日进">
  <meta name="theme-color" content="#f7f6f3">
  <title>日进</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icon.png">
  <link rel="icon" href="./icon.svg">
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f6f3;
      --surface: #ffffff;
      --ink: #1f1f1f;
      --soft-ink: #3f3d39;
      --muted: #797774;
      --faint: #aaa7a1;
      --line: #e5e2dc;
      --line-strong: #d7d2ca;
      --accent: #0a84ff;
      --accent-soft: #e5f1ff;
      --green-soft: #edf3ec;
      --green-ink: #346538;
      --yellow-soft: #fbf3db;
      --yellow-ink: #8a6500;
      --red-soft: #fdebec;
      --red-ink: #9f2f2d;
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      margin: 0;
      min-height: 100svh;
      background:
        linear-gradient(rgba(31, 31, 31, 0.018) 1px, transparent 1px),
        var(--bg);
      background-size: 100% 36px;
      color: var(--ink);
      font-family: "SF Pro Display", "SF Pro Text", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      letter-spacing: 0;
    }

    button,
    textarea,
    input {
      font: inherit;
    }

    button {
      border: 0;
      background: none;
      color: inherit;
      cursor: pointer;
    }

    .phone {
      width: min(100%, 430px);
      min-height: 100svh;
      margin: 0 auto;
      padding: max(18px, env(safe-area-inset-top)) 18px calc(94px + env(safe-area-inset-bottom));
      position: relative;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 16px;
      padding: 6px 0 18px;
    }

    .brand-kicker,
    .section-kicker {
      margin: 0 0 6px;
      color: var(--muted);
      font-family: "SF Mono", "Geist Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 11px;
      line-height: 1;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .brand {
      margin: 0;
      font-size: 34px;
      line-height: 0.95;
      font-weight: 760;
      letter-spacing: -0.04em;
    }

    .date {
      padding-bottom: 1px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 560;
      white-space: nowrap;
    }

    .screen {
      display: none;
      animation: rise 220ms ease both;
    }

    .screen.active {
      display: block;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .today-stack {
      display: grid;
      gap: 12px;
    }

    .compose {
      display: grid;
      gap: 14px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .compose-meta,
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    .compose-meta strong,
    .score-note {
      color: var(--accent);
      font-family: "SF Mono", "Geist Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 13px;
      font-variant-numeric: tabular-nums;
    }

    .prompt-label {
      color: var(--ink);
      font-size: 22px;
      line-height: 1.18;
      font-weight: 720;
      letter-spacing: -0.025em;
    }

    .main-input,
    .line-input,
    .line-textarea {
      width: 100%;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: var(--ink);
      outline: none;
      resize: none;
    }

    .main-input {
      min-height: 92px;
      padding: 0;
      font-size: 20px;
      line-height: 1.48;
      font-weight: 560;
    }

    .main-input::placeholder,
    .line-input::placeholder,
    .line-textarea::placeholder {
      color: var(--faint);
    }

    .field-line {
      display: grid;
      grid-template-columns: 54px 1fr;
      align-items: start;
      gap: 12px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }

    .field-line label {
      padding-top: 2px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    .line-input {
      min-height: 24px;
      padding: 0;
      font-size: 16px;
      line-height: 1.45;
      font-weight: 540;
    }

    .line-textarea {
      min-height: 46px;
      padding: 0;
      font-size: 15px;
      line-height: 1.5;
    }

    .chips-block {
      display: grid;
      gap: 8px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.72);
    }

    .chips {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .chip {
      min-width: 0;
      min-height: 38px;
      padding: 0 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--soft-ink);
      font-size: 14px;
      font-weight: 620;
    }

    .chip.active {
      border-color: var(--ink);
      background: #f1efeb;
      color: var(--ink);
    }

    .chip[data-category="身体"].active {
      border-color: var(--green-ink);
      background: var(--green-soft);
      color: var(--green-ink);
    }

    .chip[data-category="技术"].active {
      border-color: var(--yellow-ink);
      background: var(--yellow-soft);
      color: var(--yellow-ink);
    }

    .chip[data-category="心态"].active {
      border-color: var(--red-ink);
      background: var(--red-soft);
      color: var(--red-ink);
    }

    .week-panel,
    .panel,
    .stat,
    .entry {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .week-panel {
      padding: 14px 14px 12px;
    }

    .week-track {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      margin-top: 12px;
    }

    .day-mark {
      min-width: 0;
    }

    .day-mark i {
      display: block;
      height: 7px;
      border-radius: 3px;
      background: #e3e0da;
      opacity: 0.9;
    }

    .day-mark.done i {
      background: var(--ink);
      opacity: 1;
    }

    .day-mark.today i {
      outline: 2px solid rgba(10, 132, 255, 0.22);
      outline-offset: 3px;
    }

    .day-mark span {
      display: block;
      margin-top: 8px;
      color: var(--faint);
      font-family: "SF Mono", "Geist Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 10px;
      text-align: center;
    }

    .save-row {
      position: relative;
      display: block;
    }

    .primary {
      width: 100%;
      min-height: 52px;
      border-radius: 6px;
      background: var(--ink);
      color: #fff;
      font-size: 16px;
      font-weight: 720;
      transition: transform 150ms ease, background 150ms ease;
    }

    .primary:active {
      transform: scale(0.985);
      background: #333;
    }

    .growth-stage {
      position: relative;
      min-height: 308px;
      margin: 4px -18px 14px;
      overflow: hidden;
      border-block: 1px solid var(--line);
      background: #fbfaf8;
    }

    .growth-stage canvas {
      width: 100%;
      height: 308px;
      display: block;
    }

    .growth-copy {
      position: absolute;
      left: 18px;
      right: 18px;
      top: 18px;
      display: grid;
      gap: 4px;
      pointer-events: none;
    }

    .growth-copy h2,
    .panel h2 {
      margin: 0;
      font-size: 28px;
      line-height: 1.08;
      font-weight: 760;
      letter-spacing: -0.035em;
    }

    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.58;
    }

    .panel {
      padding: 18px;
      margin-top: 12px;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .stat {
      min-height: 102px;
      padding: 15px;
    }

    .stat strong {
      display: block;
      font-size: 34px;
      line-height: 1;
      font-weight: 730;
      letter-spacing: -0.03em;
      font-variant-numeric: tabular-nums;
    }

    .stat span {
      display: block;
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 560;
    }

    .bar {
      height: 8px;
      margin-top: 14px;
      border-radius: 3px;
      background: #e3e0da;
      overflow: hidden;
    }

    .bar span {
      display: block;
      height: 100%;
      width: var(--value, 0%);
      border-radius: inherit;
      background: var(--ink);
    }

    .timeline {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .entry {
      padding: 14px;
    }

    .entry time {
      display: block;
      color: var(--muted);
      font-family: "SF Mono", "Geist Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 11px;
      line-height: 1.4;
    }

    .entry p {
      margin: 8px 0 0;
      color: var(--soft-ink);
      font-size: 15px;
      line-height: 1.48;
    }

    .empty {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
    }

    .tabbar {
      position: fixed;
      left: 50%;
      bottom: 0;
      z-index: 10;
      width: min(100%, 430px);
      transform: translateX(-50%);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      padding: 9px 18px calc(9px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--line);
      background: rgba(247, 246, 243, 0.92);
      backdrop-filter: blur(16px);
    }

    .tab {
      min-height: 52px;
      display: grid;
      place-items: center;
      gap: 3px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 620;
    }

    .tab svg {
      width: 22px;
      height: 22px;
      stroke-width: 1.9;
    }

    .tab.active {
      color: var(--ink);
    }

    .tab.active svg {
      color: var(--accent);
    }

    @media (min-width: 700px) {
      body {
        display: grid;
        place-items: start center;
      }

      .phone {
        margin-top: 24px;
        min-height: calc(100svh - 48px);
        border: 1px solid var(--line);
        background: var(--bg);
      }
    }

    @media (max-width: 360px) {
      .phone {
        padding-inline: 14px;
      }

      .brand {
        font-size: 30px;
      }

      .prompt-label {
        font-size: 20px;
      }

      .main-input {
        font-size: 18px;
      }

      .chip {
        font-size: 13px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.001ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="phone">
    <header class="topbar">
      <div>
        <p class="brand-kicker">Daily 01</p>
        <h1 class="brand">日进</h1>
      </div>
      <div class="date" id="dateLabel"></div>
    </header>

    <section class="screen active" data-screen="today">
      <form class="today-stack" id="entryForm">
        <section class="compose" aria-label="今日晨章">
          <div class="compose-meta">
            <span>晨章</span>
            <strong id="todayScore">0%</strong>
          </div>
          <label class="prompt-label" for="move">今天推进 1% 的事</label>
          <textarea class="main-input" id="move" rows="3" placeholder="写一句，比如：剪完 30 秒 vlog / 胸推 4 组 / 复盘一局残局"></textarea>

          <div class="field-line">
            <label for="action">第一步</label>
            <input class="line-input" id="action" type="text" autocomplete="off" placeholder="小到现在就能开始">
          </div>

          <div class="field-line">
            <label for="worry">放下</label>
            <textarea class="line-textarea" id="worry" rows="2" placeholder="最吵的担心先写在这里"></textarea>
          </div>
        </section>

        <section class="chips-block" aria-label="今日状态">
          <div class="chips" id="categoryChips" aria-label="选择成长方向">
            <button class="chip active" type="button" data-category="表达">表达</button>
            <button class="chip" type="button" data-category="身体">身体</button>
            <button class="chip" type="button" data-category="技术">技术</button>
            <button class="chip" type="button" data-category="心态">心态</button>
          </div>
          <div class="chips" id="moodChips" aria-label="选择晨间状态">
            <button class="chip active" type="button" data-mood="平稳">平稳</button>
            <button class="chip" type="button" data-mood="清醒">清醒</button>
            <button class="chip" type="button" data-mood="紧绷">紧绷</button>
            <button class="chip" type="button" data-mood="低电">低电</button>
          </div>
        </section>

        <section class="week-panel" aria-label="最近七天">
          <div class="section-head">
            <span>最近七天</span>
            <span class="score-note" id="scoreSub">先写一句</span>
          </div>
          <div class="week-track" id="weekTrack"></div>
        </section>

        <div class="save-row">
          <button class="primary" id="saveButton" type="submit">完成晨章</button>
        </div>
      </form>
    </section>

    <section class="screen" data-screen="growth">
      <section class="growth-stage" aria-label="成长体">
        <canvas id="growthCanvas"></canvas>
        <div class="growth-copy">
          <p class="section-kicker">Growth Body</p>
          <h2>你每天留下的一格</h2>
        </div>
      </section>

      <section class="panel">
        <h2>累积</h2>
        <p class="sub">它只记录你早上选择过什么，不评价你停下来的日子。</p>
        <div class="stat-grid">
          <div class="stat">
            <strong id="totalDays">0</strong>
            <span>记录天数</span>
          </div>
          <div class="stat">
            <strong id="streakDays">0</strong>
            <span>连续天数</span>
          </div>
        </div>
        <div class="bar" aria-label="30 天进度"><span id="monthBar"></span></div>
      </section>
    </section>

    <section class="screen" data-screen="review">
      <section class="panel">
        <p class="section-kicker">Archive</p>
        <h2>回看</h2>
        <p class="sub">这里只留下你每天早上选过的方向。</p>
        <div class="timeline" id="timeline"></div>
      </section>
    </section>
  </main>

  <nav class="tabbar" aria-label="底部导航">
    <button class="tab active" type="button" data-target="today" aria-label="今天">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="12" r="8" fill="none" stroke="currentColor"/>
        <circle cx="12" cy="12" r="3" fill="currentColor"/>
      </svg>
      <span>今天</span>
    </button>
    <button class="tab" type="button" data-target="growth" aria-label="成长体">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <ellipse cx="12" cy="12" rx="8" ry="4" fill="none" stroke="currentColor" transform="rotate(-35 12 12)"/>
        <circle cx="12" cy="12" r="1.7" fill="currentColor"/>
      </svg>
      <span>成长体</span>
    </button>
    <button class="tab" type="button" data-target="review" aria-label="回看">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M6 4h12v16H6zM10 4v16M14 4v16M6 9h12M6 15h12" fill="none" stroke="currentColor" stroke-linecap="round"/>
      </svg>
      <span>回看</span>
    </button>
  </nav>

  <script>
    const STORAGE_KEY = "rijin.entries";
    const todayKey = dateKey(new Date());
    const state = { category: "表达", mood: "平稳" };
    const fields = {
      move: document.querySelector("#move"),
      action: document.querySelector("#action"),
      worry: document.querySelector("#worry")
    };

    function dateKey(date) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
    }

    function readEntries() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
      } catch {
        return {};
      }
    }

    function writeEntries(entries) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    }

    function formatDate(key) {
      const date = new Date(`${key}T00:00:00`);
      return date.toLocaleDateString("zh-CN", { month: "long", day: "numeric", weekday: "short" });
    }

    function sortedKeys(entries) {
      return Object.keys(entries).sort((a, b) => b.localeCompare(a));
    }

    function calcStreak(entries) {
      const day = new Date(`${todayKey}T00:00:00`);
      let count = 0;
      while (entries[dateKey(day)]) {
        count += 1;
        day.setDate(day.getDate() - 1);
      }
      return count;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      })[char]);
    }

    function todayScore() {
      const parts = [fields.move.value.trim(), fields.action.value.trim(), fields.worry.value.trim()];
      return Math.round((parts.filter(Boolean).length / parts.length) * 100);
    }

    function renderTracks(score) {
      const entries = readEntries();
      const days = [];
      const day = new Date(`${todayKey}T00:00:00`);

      for (let index = 6; index >= 0; index -= 1) {
        const date = new Date(day);
        date.setDate(day.getDate() - index);
        const key = dateKey(date);
        const done = Boolean(entries[key]) || (key === todayKey && score > 0);
        days.push(`
          <span class="day-mark ${done ? "done" : ""} ${key === todayKey ? "today" : ""}">
            <i></i>
            <span>${"日一二三四五六"[date.getDay()]}</span>
          </span>
        `);
      }

      document.querySelector("#weekTrack").innerHTML = days.join("");
    }

    function updateToday() {
      const score = todayScore();
      document.querySelector("#todayScore").textContent = `${score}%`;
      document.querySelector("#scoreSub").textContent = score ? "今天更清楚了" : "先写一句";
      renderTracks(score);
      window.dispatchEvent(new CustomEvent("rijin:score", { detail: { score } }));
    }

    function renderStats() {
      const entries = readEntries();
      const keys = sortedKeys(entries);
      document.querySelector("#totalDays").textContent = keys.length;
      document.querySelector("#streakDays").textContent = calcStreak(entries);
      document.querySelector("#monthBar").style.setProperty("--value", `${Math.min(100, keys.length / 30 * 100)}%`);
      window.dispatchEvent(new CustomEvent("rijin:entries", { detail: { count: keys.length } }));
    }

    function renderTimeline() {
      const entries = readEntries();
      const keys = sortedKeys(entries).slice(0, 14);
      const timeline = document.querySelector("#timeline");

      if (!keys.length) {
        timeline.innerHTML = '<p class="empty">还没有记录。今天写一句就够。</p>';
        return;
      }

      timeline.innerHTML = keys.map((key) => {
        const entry = entries[key];
        const text = entry.move || entry.action || entry.worry || "今天留下了一格。";
        const meta = [entry.category || "晨章", entry.mood].filter(Boolean).join(" / ");
        return `
          <article class="entry">
            <time>${formatDate(key)} / ${escapeHtml(meta)}</time>
            <p>${escapeHtml(text)}</p>
          </article>
        `;
      }).join("");
    }

    function loadToday() {
      const entry = readEntries()[todayKey];
      state.category = entry?.category || "表达";
      state.mood = entry?.mood || "平稳";
      fields.move.value = entry?.move || "";
      fields.action.value = entry?.action || "";
      fields.worry.value = entry?.worry || "";
      document.querySelectorAll(".chip").forEach((chip) => {
        chip.classList.toggle("active", chip.dataset.category === state.category || chip.dataset.mood === state.mood);
      });
      updateToday();
    }

    function saveToday() {
      const move = fields.move.value.trim();
      const action = fields.action.value.trim();
      const worry = fields.worry.value.trim();
      if (!move && !action && !worry) {
        fields.move.focus();
        return;
      }
      const entries = readEntries();
      entries[todayKey] = {
        category: state.category,
        mood: state.mood,
        move,
        action,
        worry,
        updatedAt: new Date().toISOString()
      };
      writeEntries(entries);
      updateToday();
      renderStats();
      renderTimeline();
      clearTimeout(saveToday.timer);
      const saveButton = document.querySelector("#saveButton");
      saveButton.textContent = "已保存";
      saveToday.timer = setTimeout(() => {
        saveButton.textContent = "完成晨章";
      }, 1200);
    }

    document.querySelector("#dateLabel").textContent = new Date().toLocaleDateString("zh-CN", {
      month: "long",
      day: "numeric",
      weekday: "short"
    });

    document.querySelector("#categoryChips").addEventListener("click", (event) => {
      const chip = event.target.closest(".chip");
      if (!chip) return;
      state.category = chip.dataset.category;
      document.querySelectorAll("#categoryChips .chip").forEach((item) => item.classList.toggle("active", item === chip));
    });

    document.querySelector("#moodChips").addEventListener("click", (event) => {
      const chip = event.target.closest(".chip");
      if (!chip) return;
      state.mood = chip.dataset.mood;
      document.querySelectorAll("#moodChips .chip").forEach((item) => item.classList.toggle("active", item === chip));
    });

    Object.values(fields).forEach((field) => {
      field.addEventListener("input", updateToday);
    });

    document.querySelector("#entryForm").addEventListener("submit", (event) => {
      event.preventDefault();
      saveToday();
    });

    document.querySelector(".tabbar").addEventListener("click", (event) => {
      const tab = event.target.closest(".tab");
      if (!tab) return;
      document.querySelectorAll(".tab").forEach((item) => item.classList.toggle("active", item === tab));
      document.querySelectorAll(".screen").forEach((screen) => {
        screen.classList.toggle("active", screen.dataset.screen === tab.dataset.target);
      });
      renderStats();
      renderTimeline();
      window.dispatchEvent(new CustomEvent("rijin:screen", { detail: { screen: tab.dataset.target } }));
    });

    loadToday();
    renderStats();
    renderTimeline();

    if ("serviceWorker" in navigator && location.protocol !== "file:") {
      navigator.serviceWorker.register("./sw.js");
    }
  </script>
  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.166.1/build/three.module.min.js";

    const canvas = document.querySelector("#growthCanvas");
    let renderer;
    let camera;
    let scene;
    let body;
    let dayGroup;
    let running = false;
    let entryCount = Object.keys(JSON.parse(localStorage.getItem("rijin.entries") || "{}")).length;

    function initGrowthScene() {
      if (renderer || !canvas) return;
      renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true, preserveDrawingBuffer: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.outputColorSpace = THREE.SRGBColorSpace;

      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(36, 1, 0.1, 100);
      camera.position.set(0, 0.45, 6.4);

      body = new THREE.Group();
      body.position.set(0.84, -0.42, 0);
      body.scale.setScalar(0.78);
      scene.add(body);

      const core = new THREE.Mesh(
        new THREE.IcosahedronGeometry(1.42, 3),
        new THREE.MeshStandardMaterial({
          color: 0x202020,
          roughness: 0.62,
          metalness: 0.2,
          flatShading: false
        })
      );
      body.add(core);

      const ringMaterial = new THREE.MeshStandardMaterial({
        color: 0x0a84ff,
        roughness: 0.55,
        metalness: 0.1
      });
      const ring = new THREE.Mesh(new THREE.TorusGeometry(1.74, 0.018, 12, 96), ringMaterial);
      ring.rotation.x = Math.PI / 2.8;
      body.add(ring);

      dayGroup = new THREE.Group();
      body.add(dayGroup);

      scene.add(new THREE.AmbientLight(0xffffff, 1.35));
      const key = new THREE.DirectionalLight(0xffffff, 2.1);
      key.position.set(3.8, 4.2, 5.5);
      scene.add(key);
      const side = new THREE.DirectionalLight(0xddeeff, 1.2);
      side.position.set(-4, -1.5, 3);
      scene.add(side);

      resize();
      refreshDays();
      running = true;
      animate();
    }

    function refreshDays() {
      if (!dayGroup) return;
      dayGroup.clear();
      const active = Math.max(1, Math.min(7, entryCount || 1));
      const dotGeometry = new THREE.SphereGeometry(0.09, 18, 18);
      for (let index = 0; index < 7; index += 1) {
        const angle = (index / 7) * Math.PI * 2;
        const color = index < active ? 0x0a84ff : 0xd7d2ca;
        const dot = new THREE.Mesh(dotGeometry, new THREE.MeshStandardMaterial({ color, roughness: 0.42 }));
        dot.position.set(Math.cos(angle) * 2.05, Math.sin(angle) * 0.48 - 0.2, Math.sin(angle) * 0.84);
        dayGroup.add(dot);
      }
    }

    function resize() {
      if (!renderer) return;
      const rect = canvas.getBoundingClientRect();
      const width = Math.max(1, Math.floor(rect.width));
      const height = Math.max(1, Math.floor(rect.height));
      renderer.setSize(width, height, false);
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
    }

    function animate() {
      if (!running) return;
      requestAnimationFrame(animate);
      const time = performance.now() * 0.001;
      body.rotation.y = time * 0.24;
      body.rotation.x = Math.sin(time * 0.55) * 0.08;
      renderer.render(scene, camera);
    }

    window.addEventListener("resize", resize);
    window.addEventListener("rijin:screen", (event) => {
      if (event.detail.screen === "growth") {
        initGrowthScene();
        resize();
      }
    });
    window.addEventListener("rijin:entries", (event) => {
      entryCount = event.detail.count;
      refreshDays();
    });
  </script>
</body>
