<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="日进">
  <meta name="application-name" content="日进">
  <meta name="theme-color" content="#f7f8f8">
  <title>日进</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icon.png">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%23f7f8f8'/%3E%3Ccircle cx='32' cy='32' r='16' fill='none' stroke='%230f6d73' stroke-width='6'/%3E%3Ccircle cx='42' cy='23' r='4' fill='%23dda854'/%3E%3C/svg%3E">
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8f8;
      --ink: #111314;
      --soft-ink: #3f4648;
      --muted: #8b9497;
      --line: rgba(17, 19, 20, 0.09);
      --panel: rgba(255, 255, 255, 0.74);
      --panel-solid: #ffffff;
      --teal: #0f6d73;
      --teal-soft: #e4f1f1;
      --blue: #2f7fb2;
      --blue-soft: #e7f1f9;
      --amber: #d99a38;
      --amber-soft: #f8eddc;
      --shadow: 0 24px 60px rgba(23, 34, 38, 0.09);
      --radius: 28px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      margin: 0;
      min-height: 100svh;
      background:
        radial-gradient(circle at 20% 10%, rgba(15, 109, 115, 0.08), transparent 28%),
        radial-gradient(circle at 86% 28%, rgba(217, 154, 56, 0.08), transparent 24%),
        var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang SC", sans-serif;
      letter-spacing: 0;
    }

    button,
    textarea,
    input {
      font: inherit;
    }

    button {
      border: 0;
      background: none;
      color: inherit;
      cursor: pointer;
    }

    .phone {
      width: min(100%, 430px);
      min-height: 100svh;
      margin: 0 auto;
      padding: max(18px, env(safe-area-inset-top)) 16px calc(92px + env(safe-area-inset-bottom));
      position: relative;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 6px 2px 18px;
    }

    .brand {
      margin: 0;
      font-size: 44px;
      line-height: 1;
      font-weight: 650;
      letter-spacing: -0.02em;
    }

    .date {
      color: var(--muted);
      font-size: 15px;
      font-weight: 520;
    }

    .circle-button {
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.62);
      -webkit-backdrop-filter: blur(18px);
      backdrop-filter: blur(18px);
    }

    .screen {
      display: none;
      animation: rise 220ms ease both;
    }

    .screen.active {
      display: block;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .growth-card {
      min-height: 470px;
      display: grid;
      align-content: center;
      gap: 8px;
      padding: 18px 18px 24px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.82), rgba(247, 250, 250, 0.66));
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }

    .growth-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, rgba(255, 255, 255, 0.72), transparent 36%, rgba(15, 109, 115, 0.04));
      pointer-events: none;
    }

    .orb-wrap {
      position: relative;
      width: min(310px, 100%);
      aspect-ratio: 1;
      margin: 8px auto 0;
    }

    .orb {
      width: 100%;
      height: 100%;
      overflow: visible;
      filter: drop-shadow(0 20px 32px rgba(15, 109, 115, 0.08));
    }

    .orbit {
      fill: none;
      stroke: rgba(22, 55, 60, 0.18);
      stroke-width: 0.8;
    }

    .ring {
      fill: none;
      stroke: rgba(15, 109, 115, 0.42);
      stroke-linecap: round;
      stroke-width: 1.1;
      transform-origin: 160px 160px;
    }

    .ring.hot {
      stroke: rgba(17, 126, 134, 0.75);
      stroke-width: 2.4;
      filter: drop-shadow(0 0 10px rgba(17, 126, 134, 0.32));
    }

    .grain {
      fill: rgba(19, 55, 60, 0.06);
    }

    .spark {
      fill: var(--amber);
      filter: drop-shadow(0 0 9px rgba(217, 154, 56, 0.8));
    }

    .growth-copy {
      position: relative;
      text-align: center;
    }

    .score {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      font-weight: 620;
      letter-spacing: -0.01em;
    }

    .score span {
      color: var(--blue);
      font-variant-numeric: tabular-nums;
    }

    .sub {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.45;
    }

    .sheet,
    .panel {
      border: 1px solid var(--line);
      border-radius: 26px;
      background: var(--panel);
      -webkit-backdrop-filter: blur(24px);
      backdrop-filter: blur(24px);
      box-shadow: 0 18px 44px rgba(23, 34, 38, 0.08);
    }

    .sheet {
      margin-top: -34px;
      padding: 22px 14px 14px;
      position: relative;
      z-index: 2;
    }

    .grabber {
      width: 68px;
      height: 5px;
      margin: -8px auto 14px;
      border-radius: 999px;
      background: rgba(17, 19, 20, 0.1);
    }

    details {
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.7);
      overflow: hidden;
    }

    details + details {
      margin-top: 10px;
    }

    summary {
      min-height: 76px;
      display: grid;
      grid-template-columns: 50px 1fr 18px;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      list-style: none;
    }

    summary::-webkit-details-marker {
      display: none;
    }

    .token {
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: var(--teal);
      background: var(--teal-soft);
    }

    details:nth-of-type(2) .token {
      color: var(--blue);
      background: var(--blue-soft);
    }

    details:nth-of-type(3) .token {
      color: #a86d18;
      background: var(--amber-soft);
    }

    .row-title {
      display: block;
      font-size: 18px;
      font-weight: 620;
      line-height: 1.25;
    }

    .row-preview {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.3;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .chev {
      color: var(--muted);
      transition: transform 180ms ease;
    }

    details[open] .chev {
      transform: rotate(90deg);
    }

    .detail-body {
      padding: 0 14px 14px 76px;
    }

    textarea,
    input[type="text"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.78);
      color: var(--ink);
      outline: none;
      padding: 13px 14px;
      line-height: 1.5;
      resize: none;
    }

    textarea:focus,
    input[type="text"]:focus {
      border-color: rgba(15, 109, 115, 0.45);
      box-shadow: 0 0 0 4px rgba(15, 109, 115, 0.08);
    }

    .chips {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 3px 0 12px;
      scrollbar-width: none;
    }

    .chips::-webkit-scrollbar {
      display: none;
    }

    .chip {
      flex: 0 0 auto;
      min-height: 34px;
      padding: 7px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.7);
      color: var(--soft-ink);
      font-size: 14px;
    }

    .chip.active {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }

    .save-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
    }

    .primary {
      flex: 1;
      min-height: 52px;
      border-radius: 18px;
      background: var(--ink);
      color: #fff;
      font-size: 16px;
      font-weight: 620;
    }

    .saved {
      min-width: 62px;
      color: var(--teal);
      font-size: 14px;
      font-weight: 620;
      opacity: 0;
      transition: opacity 160ms ease;
    }

    .saved.show {
      opacity: 1;
    }

    .panel {
      padding: 18px;
      margin-top: 14px;
    }

    .panel h2 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
      letter-spacing: -0.01em;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .stat {
      min-height: 104px;
      padding: 15px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.64);
    }

    .stat strong {
      display: block;
      font-size: 32px;
      line-height: 1;
      font-weight: 650;
      font-variant-numeric: tabular-nums;
    }

    .stat span {
      display: block;
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
    }

    .timeline {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .entry {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.66);
    }

    .entry time {
      display: block;
      color: var(--muted);
      font-size: 13px;
      font-weight: 520;
    }

    .entry p {
      margin: 8px 0 0;
      color: var(--soft-ink);
      font-size: 15px;
      line-height: 1.45;
    }

    .empty {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
    }

    .tabbar {
      position: fixed;
      left: 50%;
      bottom: 0;
      z-index: 10;
      width: min(100%, 430px);
      transform: translateX(-50%);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      padding: 9px 16px calc(9px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--line);
      background: rgba(250, 251, 251, 0.78);
      -webkit-backdrop-filter: blur(26px);
      backdrop-filter: blur(26px);
    }

    .tab {
      min-height: 58px;
      display: grid;
      place-items: center;
      gap: 3px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 560;
    }

    .tab svg {
      width: 24px;
      height: 24px;
      stroke-width: 1.8;
    }

    .tab.active {
      color: var(--teal);
    }

    .large-orb {
      margin-top: 16px;
    }

    .bar {
      height: 8px;
      margin-top: 12px;
      border-radius: 999px;
      background: rgba(17, 19, 20, 0.07);
      overflow: hidden;
    }

    .bar span {
      display: block;
      height: 100%;
      width: var(--value, 0%);
      border-radius: inherit;
      background: linear-gradient(90deg, var(--teal), var(--blue));
    }

    @media (min-width: 700px) {
      body {
        display: grid;
        place-items: start center;
      }

      .phone {
        margin-top: 24px;
        min-height: calc(100svh - 48px);
        border: 1px solid var(--line);
        border-radius: 34px;
        box-shadow: 0 30px 80px rgba(23, 34, 38, 0.12);
      }

      .tabbar {
        border-radius: 0 0 34px 34px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.001ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="phone">
    <header class="topbar">
      <h1 class="brand">日进</h1>
      <div class="date" id="dateLabel"></div>
      <button class="circle-button" type="button" aria-label="菜单">
        <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
          <path d="M5 8h14M5 12h14M5 16h14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>
    </header>

    <section class="screen active" data-screen="today">
      <section class="growth-card" aria-label="今日成长体">
        <div class="orb-wrap" aria-hidden="true">
          <svg class="orb" viewBox="0 0 320 320">
            <circle class="orbit" cx="160" cy="160" r="132"/>
            <circle class="grain" cx="88" cy="154" r="2"/>
            <circle class="grain" cx="235" cy="62" r="3"/>
            <circle class="grain" cx="272" cy="171" r="1.8"/>
            <circle class="ring" data-ring cx="160" cy="160" r="78"/>
            <circle class="ring" data-ring cx="160" cy="160" r="84"/>
            <circle class="ring" data-ring cx="160" cy="160" r="90"/>
            <circle class="ring" data-ring cx="160" cy="160" r="96"/>
            <circle class="ring" data-ring cx="160" cy="160" r="102"/>
            <circle class="ring" data-ring cx="160" cy="160" r="108"/>
            <circle class="ring hot" id="hotRing" cx="160" cy="160" r="112"/>
            <circle class="spark" id="spark" cx="91" cy="217" r="5"/>
          </svg>
        </div>
        <div class="growth-copy">
          <p class="score">晨章 <span id="todayScore">0%</span></p>
          <p class="sub" id="scoreSub">把脑子清空一点，今天会更稳。</p>
        </div>
      </section>

      <form class="sheet" id="entryForm">
        <div class="grabber"></div>

        <div class="chips" id="categoryChips" aria-label="选择成长方向">
          <button class="chip active" type="button" data-category="表达">表达</button>
          <button class="chip" type="button" data-category="身体">身体</button>
          <button class="chip" type="button" data-category="技术">技术</button>
          <button class="chip" type="button" data-category="心态">心态</button>
        </div>

        <div class="chips" id="moodChips" aria-label="选择晨间状态">
          <button class="chip active" type="button" data-mood="平稳">平稳</button>
          <button class="chip" type="button" data-mood="清醒">清醒</button>
          <button class="chip" type="button" data-mood="紧绷">紧绷</button>
          <button class="chip" type="button" data-mood="低电">低电</button>
        </div>

        <details open>
          <summary>
            <span class="token">
              <svg viewBox="0 0 24 24" width="23" height="23" aria-hidden="true">
                <path d="m5 15 4-4 4 4 6-7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M15 8h4v4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
            <span>
              <span class="row-title">今天的主线</span>
              <span class="row-preview" id="movePreview">只定一件今天最值得推进的事</span>
            </span>
            <span class="chev">›</span>
          </summary>
          <div class="detail-body">
            <textarea id="move" rows="3" placeholder="如果今天只推进一件事，我希望是..."></textarea>
          </div>
        </details>

        <details>
          <summary>
            <span class="token">
              <svg viewBox="0 0 24 24" width="23" height="23" aria-hidden="true">
                <path d="M13 2 4 14h7l-1 8 9-12h-7l1-8Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
              </svg>
            </span>
            <span>
              <span class="row-title">第一步</span>
              <span class="row-preview" id="actionPreview">小到现在就能开始</span>
            </span>
            <span class="chev">›</span>
          </summary>
          <div class="detail-body">
            <input id="action" type="text" autocomplete="off" placeholder="例如：打开工程文件，先做 10 分钟">
          </div>
        </details>

        <details>
          <summary>
            <span class="token">
              <svg viewBox="0 0 24 24" width="23" height="23" aria-hidden="true">
                <path d="M4 14h16M6 18h12M8 10a4 4 0 0 1 8 0v4H8v-4Z" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
            <span>
              <span class="row-title">脑内噪音</span>
              <span class="row-preview" id="worryPreview">写下来，然后只留下今天能做的部分</span>
            </span>
            <span class="chev">›</span>
          </summary>
          <div class="detail-body">
            <textarea id="worry" rows="3" placeholder="我担心... 但今天只需要..."></textarea>
          </div>
        </details>

        <div class="save-row">
          <button class="primary" type="submit">完成晨章</button>
          <span class="saved" id="savedLabel">已保存</span>
        </div>
      </form>
    </section>

    <section class="screen" data-screen="growth">
      <section class="panel">
        <h2>成长体</h2>
        <p class="sub">它记录每天早上给自己的一个方向，不评价你停下来的日子。</p>
        <div class="orb-wrap large-orb" aria-hidden="true">
          <svg class="orb" viewBox="0 0 320 320">
            <circle class="orbit" cx="160" cy="160" r="136"/>
            <circle class="ring" cx="160" cy="160" r="70"/>
            <circle class="ring" cx="160" cy="160" r="82"/>
            <circle class="ring" cx="160" cy="160" r="94"/>
            <circle class="ring" cx="160" cy="160" r="106"/>
            <circle class="ring hot" cx="160" cy="160" r="118"/>
            <circle class="spark" cx="228" cy="92" r="5"/>
          </svg>
        </div>
      </section>

      <section class="panel">
        <h2>累积</h2>
        <div class="stat-grid">
          <div class="stat">
            <strong id="totalDays">0</strong>
            <span>记录天数</span>
          </div>
          <div class="stat">
            <strong id="streakDays">0</strong>
            <span>连续天数</span>
          </div>
        </div>
        <div class="bar" aria-label="30 天进度"><span id="monthBar"></span></div>
      </section>
    </section>

    <section class="screen" data-screen="review">
      <section class="panel">
        <h2>回看</h2>
        <p class="sub">这里不是总结成败，只是留下你每天早上选择过的方向。</p>
        <div class="timeline" id="timeline"></div>
      </section>
    </section>
  </main>

  <nav class="tabbar" aria-label="底部导航">
    <button class="tab active" type="button" data-target="today" aria-label="今天">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="12" r="8" fill="none" stroke="currentColor"/>
        <circle cx="12" cy="12" r="3" fill="currentColor"/>
      </svg>
      <span>今天</span>
    </button>
    <button class="tab" type="button" data-target="growth" aria-label="成长体">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <ellipse cx="12" cy="12" rx="8" ry="4" fill="none" stroke="currentColor" transform="rotate(-35 12 12)"/>
        <circle cx="12" cy="12" r="1.7" fill="currentColor"/>
      </svg>
      <span>成长体</span>
    </button>
    <button class="tab" type="button" data-target="review" aria-label="回看">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M6 4h12v16H6zM10 4v16M14 4v16M6 9h12M6 15h12" fill="none" stroke="currentColor" stroke-linecap="round"/>
      </svg>
      <span>回看</span>
    </button>
  </nav>

  <script>
    const STORAGE_KEY = "rijin.entries";
    const todayKey = dateKey(new Date());
    const state = { category: "表达", mood: "平稳" };
    const fields = {
      move: document.querySelector("#move"),
      action: document.querySelector("#action"),
      worry: document.querySelector("#worry")
    };

    function dateKey(date) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
    }

    function readEntries() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
      } catch {
        return {};
      }
    }

    function writeEntries(entries) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    }

    function formatDate(key) {
      const date = new Date(`${key}T00:00:00`);
      return date.toLocaleDateString("zh-CN", { month: "long", day: "numeric", weekday: "short" });
    }

    function sortedKeys(entries) {
      return Object.keys(entries).sort((a, b) => b.localeCompare(a));
    }

    function calcStreak(entries) {
      const day = new Date(`${todayKey}T00:00:00`);
      let count = 0;
      while (entries[dateKey(day)]) {
        count += 1;
        day.setDate(day.getDate() - 1);
      }
      return count;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      })[char]);
    }

    function updatePreviews() {
      document.querySelector("#movePreview").textContent = fields.move.value || "只定一件今天最值得推进的事";
      document.querySelector("#actionPreview").textContent = fields.action.value || "小到现在就能开始";
      document.querySelector("#worryPreview").textContent = fields.worry.value || "写下来，然后只留下今天能做的部分";
    }

    function todayScore() {
      const parts = [fields.move.value.trim(), fields.action.value.trim(), fields.worry.value.trim()];
      return Math.round((parts.filter(Boolean).length / parts.length) * 100);
    }

    function updateOrb() {
      const score = todayScore();
      const entries = readEntries();
      const total = sortedKeys(entries).length;
      const hot = document.querySelector("#hotRing");
      const spark = document.querySelector("#spark");
      const rings = document.querySelectorAll("[data-ring]");

      rings.forEach((ring, index) => {
        const length = 2 * Math.PI * Number(ring.getAttribute("r"));
        const visible = Math.min(1, (total + index + 1) / 18);
        ring.style.strokeDasharray = `${length * visible} ${length}`;
        ring.style.transform = `rotate(${index * 10 + total * 4}deg)`;
      });

      const length = 2 * Math.PI * 112;
      hot.style.strokeDasharray = `${length * Math.max(score, 6) / 100} ${length}`;
      hot.style.transform = "rotate(-126deg)";

      const angle = (-126 + score * 2.7) * Math.PI / 180;
      spark.setAttribute("cx", 160 + Math.cos(angle) * 112);
      spark.setAttribute("cy", 160 + Math.sin(angle) * 112);
      document.querySelector("#todayScore").textContent = `${score}%`;
      document.querySelector("#scoreSub").textContent = score ? "今天的方向已经变清楚。" : "把脑子清空一点，今天会更稳。";
    }

    function renderStats() {
      const entries = readEntries();
      const keys = sortedKeys(entries);
      document.querySelector("#totalDays").textContent = keys.length;
      document.querySelector("#streakDays").textContent = calcStreak(entries);
      document.querySelector("#monthBar").style.setProperty("--value", `${Math.min(100, keys.length / 30 * 100)}%`);
    }

    function renderTimeline() {
      const entries = readEntries();
      const keys = sortedKeys(entries).slice(0, 14);
      const timeline = document.querySelector("#timeline");

      if (!keys.length) {
        timeline.innerHTML = '<p class="empty">还没有记录。今天写一句就够。</p>';
        return;
      }

      timeline.innerHTML = keys.map((key) => {
        const entry = entries[key];
        const text = entry.move || entry.action || entry.worry || "今天留下了一格。";
        const meta = [entry.category || "晨章", entry.mood].filter(Boolean).join(" · ");
        return `
          <article class="entry">
            <time>${formatDate(key)} · ${escapeHtml(meta)}</time>
            <p>${escapeHtml(text)}</p>
          </article>
        `;
      }).join("");
    }

    function loadToday() {
      const entry = readEntries()[todayKey];
      state.category = entry?.category || "表达";
      state.mood = entry?.mood || "平稳";
      fields.move.value = entry?.move || "";
      fields.action.value = entry?.action || "";
      fields.worry.value = entry?.worry || "";
      document.querySelectorAll(".chip").forEach((chip) => {
        chip.classList.toggle("active", chip.dataset.category === state.category || chip.dataset.mood === state.mood);
      });
      updatePreviews();
      updateOrb();
    }

    function saveToday() {
      const move = fields.move.value.trim();
      const action = fields.action.value.trim();
      const worry = fields.worry.value.trim();
      if (!move && !action && !worry) {
        fields.move.focus();
        return;
      }
      const entries = readEntries();
      entries[todayKey] = {
        category: state.category,
        mood: state.mood,
        move,
        action,
        worry,
        updatedAt: new Date().toISOString()
      };
      writeEntries(entries);
      updatePreviews();
      updateOrb();
      renderStats();
      renderTimeline();
      const saved = document.querySelector("#savedLabel");
      saved.classList.add("show");
      clearTimeout(saveToday.timer);
      saveToday.timer = setTimeout(() => saved.classList.remove("show"), 1200);
    }

    document.querySelector("#dateLabel").textContent = new Date().toLocaleDateString("zh-CN", {
      month: "long",
      day: "numeric",
      weekday: "short"
    });

    document.querySelector("#categoryChips").addEventListener("click", (event) => {
      const chip = event.target.closest(".chip");
      if (!chip) return;
      state.category = chip.dataset.category;
      document.querySelectorAll("#categoryChips .chip").forEach((item) => item.classList.toggle("active", item === chip));
    });

    document.querySelector("#moodChips").addEventListener("click", (event) => {
      const chip = event.target.closest(".chip");
      if (!chip) return;
      state.mood = chip.dataset.mood;
      document.querySelectorAll("#moodChips .chip").forEach((item) => item.classList.toggle("active", item === chip));
    });

    Object.values(fields).forEach((field) => {
      field.addEventListener("input", () => {
        updatePreviews();
        updateOrb();
      });
    });

    document.querySelector("#entryForm").addEventListener("submit", (event) => {
      event.preventDefault();
      saveToday();
    });

    document.querySelector(".tabbar").addEventListener("click", (event) => {
      const tab = event.target.closest(".tab");
      if (!tab) return;
      document.querySelectorAll(".tab").forEach((item) => item.classList.toggle("active", item === tab));
      document.querySelectorAll(".screen").forEach((screen) => {
        screen.classList.toggle("active", screen.dataset.screen === tab.dataset.target);
      });
      renderStats();
      renderTimeline();
    });

    loadToday();
    renderStats();
    renderTimeline();

    if ("serviceWorker" in navigator && location.protocol !== "file:") {
      navigator.serviceWorker.register("./sw.js");
    }
  </script>
</body>
</html>
